<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Remote Tool — Вход</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:#0f0f13;font-family:'Segoe UI',system-ui,sans-serif;color:#e0e0e0}
  .card{background:#1a1a24;border:1px solid #2a2a3a;border-radius:16px;padding:48px 40px;
        width:100%;max-width:400px;box-shadow:0 24px 60px #00000080}
  h1{font-size:1.5rem;font-weight:700;margin-bottom:8px;color:#fff;letter-spacing:-.5px}
  .sub{color:#666;font-size:.9rem;margin-bottom:32px}
  label{display:block;font-size:.8rem;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  input{width:100%;padding:12px 16px;background:#0f0f18;border:1px solid #2a2a3a;border-radius:10px;
        color:#e0e0e0;font-size:1rem;outline:none;transition:border .2s}
  input:focus{border-color:#6c63ff}
  .btn{margin-top:24px;width:100%;padding:14px;background:#6c63ff;color:#fff;border:none;
       border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s}
  .btn:hover{background:#7c74ff}
  .error{margin-top:16px;padding:10px 14px;background:#ff4f4f18;border:1px solid #ff4f4f44;
         border-radius:8px;color:#ff7070;font-size:.9rem}
  .icon{font-size:2.5rem;margin-bottom:20px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔐</div>
  <h1>Remote Access Tool</h1>
  <p class="sub">Введите пароль для подключения</p>
  <form method="POST">
    <label>Пароль</label>
    <input type="password" name="password" placeholder="••••••••" autofocus required>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <button type="submit" class="btn">Войти →</button>
  </form>
</div>
</body>
</html>
