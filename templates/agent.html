<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Agent — Remote Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');
  :root {
    --bg:#080c10;--surface:#0d1117;--surface2:#111820;--surface3:#151d26;
    --border:#1e2d3d;--accent:#00d4ff;--accent2:#ff6b35;
    --green:#39ff14;--yellow:#ffd700;--text:#c9d1d9;--dim:#4a5568;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  .grid-bg{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);background-size:40px 40px;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:10;}
  .back-btn{color:var(--dim);text-decoration:none;font-size:12px;letter-spacing:2px;transition:color .2s;}
  .back-btn:hover{color:var(--accent);}
  .logo{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--accent);letter-spacing:3px;}
  .logo span{color:var(--accent2);}
  .agent-title{font-family:'Rajdhani',sans-serif;font-size:16px;color:var(--text);letter-spacing:2px;margin-left:8px;}
  #status-badge{padding:3px 10px;font-size:10px;letter-spacing:1px;}
  .tab-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-shrink:0;z-index:10;}
  .tab{padding:14px 24px;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all .2s;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab:hover:not(.active){color:var(--text);}
  .content{flex:1;overflow:hidden;display:flex;position:relative;}
  .panel{display:none;flex:1;overflow:hidden;flex-direction:column;}
  .panel.active{display:flex;}

  /* Shell */
  .shell-output{flex:1;overflow-y:auto;padding:16px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-all;}
  .shell-output .entry-cmd{color:var(--accent);margin-top:12px;}
  .shell-output .entry-cmd::before{content:'❯ ';color:var(--green);}
  .shell-output .entry-out{color:var(--text);opacity:.9;}
  .shell-output .entry-err{color:var(--accent2);}
  .shell-input{display:flex;background:var(--surface);border-top:1px solid var(--border);align-items:center;padding:0 16px;gap:8px;flex-shrink:0;}
  .prompt{color:var(--green);font-size:14px;}
  .shell-input input{flex:1;background:transparent;border:none;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:13px;padding:14px 0;outline:none;}
  .shell-send{background:transparent;border:1px solid var(--border);color:var(--dim);padding:6px 14px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
  .shell-send:hover{border-color:var(--accent);color:var(--accent);}
  .cmd-history-hint{color:var(--dim);font-size:11px;padding:4px 16px;background:var(--surface);border-bottom:1px solid var(--border);}

  /* Files */
  .file-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .path-bar{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 12px;font-family:'Share Tech Mono',monospace;font-size:12px;outline:none;}
  .path-bar:focus{border-color:var(--accent);}
  .tb-btn{background:transparent;border:1px solid var(--border);color:var(--dim);padding:6px 12px;font-size:11px;cursor:pointer;font-family:'Share Tech Mono',monospace;letter-spacing:1px;transition:all .2s;}
  .tb-btn:hover{border-color:var(--accent);color:var(--accent);}
  .file-list{flex:1;overflow-y:auto;}
  .file-item{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(30,45,61,.5);cursor:pointer;transition:background .15s;gap:12px;}
  .file-item:hover{background:var(--surface2);}
  .file-icon{width:20px;text-align:center;font-size:14px;}
  .file-name{flex:1;font-size:13px;}
  .file-meta{font-size:11px;color:var(--dim);}
  .file-actions{display:flex;gap:8px;opacity:0;transition:opacity .15s;}
  .file-item:hover .file-actions{opacity:1;}
  .fa-btn{background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:2px 6px;transition:color .15s;}
  .fa-btn:hover{color:var(--accent);}
  .fa-btn.del:hover{color:var(--accent2);}
  .upload-area{margin:16px;border:2px dashed var(--border);padding:32px;text-align:center;color:var(--dim);font-size:12px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
  .upload-area:hover{border-color:var(--accent);color:var(--accent);}

  /* Sysinfo */
  .sysinfo-grid{padding:24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;overflow-y:auto;}
  .si-card{background:var(--surface);border:1px solid var(--border);padding:20px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);}
  .si-title{font-size:10px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;}
  .si-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;}
  .si-key{color:var(--dim);}
  .si-val{color:var(--text);}
  .progress{height:4px;background:var(--border);margin-top:4px;margin-bottom:8px;border-radius:2px;}
  .progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .5s;}
  .progress-bar.warn{background:var(--yellow);}
  .progress-bar.crit{background:var(--accent2);}
  .proc-table{width:100%;border-collapse:collapse;font-size:11px;}
  .proc-table th{text-align:left;color:var(--dim);padding:6px 8px;border-bottom:1px solid var(--border);letter-spacing:1px;}
  .proc-table td{padding:5px 8px;border-bottom:1px solid rgba(30,45,61,.4);}
  .proc-table tr:hover td{background:var(--surface2);}
  .sysinfo-full{padding:24px;overflow-y:auto;}

  /* Screenshot */
  .screenshot-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow:auto;}
  .screenshot-panel img{max-width:100%;border:1px solid var(--border);box-shadow:0 0 40px rgba(0,212,255,.1);}
  .scr-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:12px 32px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:4px;cursor:pointer;transition:all .2s;margin-bottom:24px;}
  .scr-btn:hover{background:var(--accent);color:var(--bg);}
  .loader{color:var(--dim);font-size:12px;letter-spacing:3px;animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

  /* scrollbar */
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--dim);}
</style>
</head>
<body>
<div class="grid-bg"></div>
<header>
  <a href="/" class="back-btn">← BACK</a>
  <div class="logo">REMOTE<span>TOOL</span></div>
  <div class="agent-title" id="agent-hostname">Loading...</div>
  <span id="status-badge" class="badge badge-online" style="padding:3px 10px;font-size:10px;letter-spacing:1px;background:rgba(57,255,20,.1);border:1px solid #39ff14;color:#39ff14">ONLINE</span>
</header>
<div class="tab-bar">
  <div class="tab active" onclick="switchTab('shell')">⌨ SHELL</div>
  <div class="tab" onclick="switchTab('files')">📁 FILES</div>
  <div class="tab" onclick="switchTab('sysinfo')">📊 SYSINFO</div>
  <div class="tab" onclick="switchTab('screenshot')">🖥 SCREENSHOT</div>
</div>
<div class="content">

  <!-- SHELL -->
  <div class="panel active" id="tab-shell">
    <div class="cmd-history-hint">↑↓ history • Enter to run</div>
    <div class="shell-output" id="shell-output"><span style="color:var(--dim);font-size:12px">Session started. Type commands below.<br></span></div>
    <div class="shell-input">
      <span class="prompt">❯</span>
      <input type="text" id="shell-cmd" placeholder="Enter command..." autocomplete="off">
      <button class="shell-send" onclick="runCmd()">RUN</button>
    </div>
  </div>

  <!-- FILES -->
  <div class="panel" id="tab-files">
    <div class="file-toolbar">
      <input type="text" class="path-bar" id="file-path" value="~" placeholder="/path/to/dir">
      <button class="tb-btn" onclick="loadFiles()">GO</button>
      <button class="tb-btn" onclick="goUp()">↑ UP</button>
      <button class="tb-btn" onclick="mkdirPrompt()">+ DIR</button>
      <label class="tb-btn" style="cursor:pointer">⬆ UPLOAD<input type="file" id="upload-input" style="display:none" onchange="uploadFile(this)"></label>
    </div>
    <div class="file-list" id="file-list">
      <div style="padding:40px;text-align:center;color:var(--dim)">Loading...</div>
    </div>
  </div>

  <!-- SYSINFO -->
  <div class="panel" id="tab-sysinfo">
    <div class="sysinfo-full" id="sysinfo-content">
      <div style="padding:40px;text-align:center;color:var(--dim)">Loading system info...</div>
    </div>
  </div>

  <!-- SCREENSHOT -->
  <div class="panel screenshot-panel" id="tab-screenshot">
    <button class="scr-btn" onclick="takeScreenshot()">📷 CAPTURE SCREEN</button>
    <div id="screenshot-area" style="text-align:center;color:var(--dim);font-size:12px;letter-spacing:2px">Click to capture the remote screen</div>
  </div>

</div>

<script>
const AGENT = '{{ agent_id }}';
let cmdHistory = [], histIndex = -1;

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if (name==='files') loadFiles();
  if (name==='sysinfo') loadSysinfo();
}

// Shell
const shellOutput = document.getElementById('shell-output');
const shellInput  = document.getElementById('shell-cmd');

function appendShell(type, text) {
  const div = document.createElement('div');
  div.className = 'entry-' + type;
  div.textContent = text;
  shellOutput.appendChild(div);
  shellOutput.scrollTop = shellOutput.scrollHeight;
}

async function runCmd() {
  const cmd = shellInput.value.trim();
  if (!cmd) return;
  cmdHistory.unshift(cmd); histIndex = -1;
  shellInput.value = '';
  appendShell('cmd', cmd);
  const resp = await fetch(`/api/agent/${AGENT}/shell`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({cmd})
  });
  const data = await resp.json();
  appendShell(data.output?.startsWith('[ERROR]') ? 'err' : 'out', data.output || data.error || '');
}

shellInput.addEventListener('keydown', e => {
  if (e.key==='Enter') runCmd();
  if (e.key==='ArrowUp') { histIndex=Math.min(histIndex+1,cmdHistory.length-1); shellInput.value=cmdHistory[histIndex]||''; }
  if (e.key==='ArrowDown') { histIndex=Math.max(histIndex-1,-1); shellInput.value=histIndex<0?'':cmdHistory[histIndex]; }
});

// Files
let currentPath = '~';
async function loadFiles(path) {
  if (path !== undefined) currentPath = path;
  else currentPath = document.getElementById('file-path').value || '~';
  document.getElementById('file-path').value = currentPath;
  const resp = await fetch(`/api/agent/${AGENT}/files?path=${encodeURIComponent(currentPath)}`);
  const data = await resp.json();
  if (data.error) {
    document.getElementById('file-list').innerHTML=`<div style="padding:24px;color:var(--accent2)">Error: ${data.error}</div>`;
    return;
  }
  currentPath = data.path;
  document.getElementById('file-path').value = currentPath;
  const list = document.getElementById('file-list');
  if (!data.entries?.length) {
    list.innerHTML='<div style="padding:40px;text-align:center;color:var(--dim)">Empty directory</div>'; return;
  }
  list.innerHTML = data.entries.map(e => `
    <div class="file-item" ondblclick="${e.is_dir?`loadFiles('${(currentPath+'/'+e.name).replace(/'/g,"\\'")}')`:''}" >
      <div class="file-icon">${e.is_dir?'📁':'📄'}</div>
      <div class="file-name">${e.name}</div>
      <div class="file-meta">${e.is_dir?'DIR':fmtSize(e.size)}</div>
      <div class="file-meta" style="margin-right:8px">${new Date(e.mtime*1000).toLocaleDateString()}</div>
      <div class="file-actions">
        ${!e.is_dir?`<button class="fa-btn" onclick="dlFile('${(currentPath+'/'+e.name).replace(/'/g,"\\'")}');event.stopPropagation()">⬇</button>`:''}
        <button class="fa-btn del" onclick="delFile('${(currentPath+'/'+e.name).replace(/'/g,"\\'")}');event.stopPropagation()">✕</button>
      </div>
    </div>`).join('');
}

function goUp() {
  const parts = currentPath.split('/').filter(Boolean);
  parts.pop();
  loadFiles('/'+parts.join('/') || '/');
}

function fmtSize(b) {
  if(b<1024)return b+'B';
  if(b<1048576)return (b/1024).toFixed(1)+'KB';
  return (b/1048576).toFixed(1)+'MB';
}

function dlFile(path) {
  window.open(`/api/agent/${AGENT}/file/download?path=${encodeURIComponent(path)}`);
}

async function delFile(path) {
  if(!confirm(`Delete ${path}?`)) return;
  await fetch(`/api/agent/${AGENT}/file/delete`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path})});
  loadFiles();
}

async function mkdirPrompt() {
  const name = prompt('New directory name:');
  if(!name) return;
  await fetch(`/api/agent/${AGENT}/file/mkdir`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:currentPath+'/'+name})});
  loadFiles();
}

async function uploadFile(input) {
  const file = input.files[0]; if(!file) return;
  const fd = new FormData();
  fd.append('file', file);
  fd.append('path', currentPath+'/'+file.name);
  await fetch(`/api/agent/${AGENT}/file/upload`, {method:'POST',body:fd});
  loadFiles(); input.value='';
}

// Sysinfo
async function loadSysinfo() {
  document.getElementById('sysinfo-content').innerHTML='<div style="padding:40px;text-align:center;color:var(--dim);letter-spacing:3px">Fetching system data...</div>';
  const resp = await fetch(`/api/agent/${AGENT}/sysinfo`);
  const d = await resp.json();
  if(d.error) { document.getElementById('sysinfo-content').innerHTML=`<div style="padding:24px;color:var(--accent2)">Error: ${d.error}</div>`; return; }
  document.getElementById('agent-hostname').textContent = d.hostname || '';
  const ramPct = d.ram_percent||0, diskPct = d.disk_percent||0;
  const cpuColor = d.cpu_percent>80?'crit':d.cpu_percent>60?'warn':'';
  const ramColor = ramPct>80?'crit':ramPct>60?'warn':'';
  const diskColor = diskPct>80?'crit':diskPct>60?'warn':'';
  document.getElementById('sysinfo-content').innerHTML = `
  <div class="sysinfo-grid">
    <div class="si-card"><div class="si-title">System</div>
      <div class="si-row"><span class="si-key">Hostname</span><span class="si-val">${d.hostname}</span></div>
      <div class="si-row"><span class="si-key">OS</span><span class="si-val">${d.os}</span></div>
      <div class="si-row"><span class="si-key">Arch</span><span class="si-val">${d.arch}</span></div>
      <div class="si-row"><span class="si-key">CPU</span><span class="si-val">${d.cpu_model||'N/A'}</span></div>
      <div class="si-row"><span class="si-key">CPU Cores</span><span class="si-val">${d.cpu_count}</span></div>
    </div>
    <div class="si-card"><div class="si-title">CPU Usage</div>
      <div class="si-row"><span class="si-key">Usage</span><span class="si-val" style="${d.cpu_percent>80?'color:var(--accent2)':d.cpu_percent>60?'color:var(--yellow)':''}">${d.cpu_percent}%</span></div>
      <div class="progress"><div class="progress-bar ${cpuColor}" style="width:${d.cpu_percent}%"></div></div>
    </div>
    <div class="si-card"><div class="si-title">Memory</div>
      <div class="si-row"><span class="si-key">Total</span><span class="si-val">${fmtBytes(d.ram_total)}</span></div>
      <div class="si-row"><span class="si-key">Used</span><span class="si-val">${fmtBytes(d.ram_used)} (${ramPct}%)</span></div>
      <div class="progress"><div class="progress-bar ${ramColor}" style="width:${ramPct}%"></div></div>
    </div>
    <div class="si-card"><div class="si-title">Disk</div>
      <div class="si-row"><span class="si-key">Total</span><span class="si-val">${fmtBytes(d.disk_total)}</span></div>
      <div class="si-row"><span class="si-key">Used</span><span class="si-val">${fmtBytes(d.disk_used)} (${diskPct}%)</span></div>
      <div class="progress"><div class="progress-bar ${diskColor}" style="width:${diskPct}%"></div></div>
    </div>
  </div>
  <div style="padding:0 24px 24px">
    <div style="font-size:11px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px">Top Processes</div>
    <table class="proc-table">
      <tr><th>PID</th><th>NAME</th><th>CPU%</th><th>MEM%</th><th>STATUS</th></tr>
      ${(d.processes||[]).slice(0,20).map(p=>`<tr><td>${p.pid}</td><td>${p.name}</td><td>${(p.cpu_percent||0).toFixed(1)}</td><td>${(p.memory_percent||0).toFixed(1)}</td><td>${p.status}</td></tr>`).join('')}
    </table>
  </div>`;
}

function fmtBytes(b) {
  if(!b)return'0B';
  const units=['B','KB','MB','GB','TB'];
  let i=0; while(b>=1024&&i<4){b/=1024;i++;}
  return b.toFixed(1)+units[i];
}

// Screenshot
async function takeScreenshot() {
  const area = document.getElementById('screenshot-area');
  area.innerHTML='<div class="loader">CAPTURING...</div>';
  const resp = await fetch(`/api/agent/${AGENT}/screenshot`);
  const data = await resp.json();
  if(!data.ok) { area.innerHTML='<div style="color:var(--accent2)">Screenshot failed. Is a display available?</div>'; return; }
  area.innerHTML=`<img src="data:image/jpeg;base64,${data.data}" alt="screenshot"><div style="margin-top:12px;font-size:11px;color:var(--dim)">Captured ${new Date().toLocaleTimeString()}</div>`;
}

// Init
loadFiles();
</script>
</body>
</html>
